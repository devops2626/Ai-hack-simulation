name: 🔒 Security Scanning

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'  # Weekly scans

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  dependency-scan:
    name: 🔍 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pip-audit safety
      
      - name: Run pip-audit (Strict)
        run: pip-audit --desc --strict
      
      - name: Run Safety check
        run: safety check --json || true
  
  sast-bandit:
    name: 🎯 Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit scan
        run: bandit -r src/ examples/ -f json -o bandit-report.json || true
      
      - name: Check for critical issues
        run: |
          python << 'EOF'
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          critical = [r for r in report['results'] if r['severity'] == 'HIGH']
          if critical:
              print(f"❌ Found {len(critical)} HIGH severity issues:")
              for issue in critical:
                  print(f"  - {issue['test']}: {issue['issue_text']}")
              exit(1)
          EOF
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  secret-scan:
    name: 🔑 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  container-scan:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ai-hack-simulator:security-scan
          provenance: false
      
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-hack-simulator:security-scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  code-quality:
    name: ✨ Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install tools
        run: pip install flake8 black pylint

      - name: Format check with Black
        run: black --check src/ examples/

      - name: Lint with Flake8
        run: flake8 src/ examples/ --count --show-source --statistics

      - name: Analyze with Pylint
        run: pylint src/ --fail-under=7.0 || true

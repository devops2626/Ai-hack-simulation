name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Agent Simulation
        run: python src/agent.py

      - name: Test Vulnerable Server + Payload
        run: |
          python src/vulnerable_server.py & sleep 3
          python examples/payload_demo.py

      - name: Docker Build Test
        run: docker build -t ai-hacking-simulator .
